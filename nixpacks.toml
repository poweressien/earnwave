[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --no-input"]

[start]
cmd = "python manage.py migrate --no-input && gunicorn earnwave.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
