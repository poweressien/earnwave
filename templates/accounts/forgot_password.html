{% extends 'base.html' %}
{% block title %}Forgot Password - EarnWave{% endblock %}
{% block body %}
{% include 'partials/navbar.html' %}
<div class="auth-page" style="min-height:calc(100vh - 60px)">
  <div class="auth-bg-glow"></div>
  <div class="auth-card animate-fade-up">
    <div class="text-center mb-4">
      <div style="width:56px;height:56px;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.25);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.5rem">&#128272;</div>
      <h2 style="font-family:var(--font-display);font-weight:800;font-size:1.5rem">Forgot Password?</h2>
      <p class="text-muted-ew" style="font-size:.9rem;margin-top:.25rem">No worries! Enter your email and we'll send you a reset code.</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label-ew">Email Address</label>
        <input type="email" name="email" class="ew-form-control" placeholder="you@example.com" required autofocus>
      </div>
      <button type="submit" class="btn-primary-ew w-100" style="justify-content:center">
        <i class="fas fa-paper-plane"></i> Send Reset Code
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'accounts:login' %}" style="color:var(--muted);font-size:.875rem">
        <i class="fas fa-arrow-left me-1"></i> Back to Sign In
      </a>
    </div>
  </div>
</div>
{% endblock %}
