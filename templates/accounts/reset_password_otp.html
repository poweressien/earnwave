{% extends 'base.html' %}
{% block title %}Enter OTP - EarnWave{% endblock %}
{% block body %}
{% include 'partials/navbar.html' %}
<div class="auth-page" style="min-height:calc(100vh - 60px)">
  <div class="auth-bg-glow"></div>
  <div class="auth-card animate-fade-up">
    <div class="text-center mb-4">
      <div style="width:56px;height:56px;background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.25);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.5rem">&#128233;</div>
      <h2 style="font-family:var(--font-display);font-weight:800;font-size:1.5rem">Enter OTP</h2>
      <p class="text-muted-ew" style="font-size:.9rem;margin-top:.25rem">Check your email for a 6-digit reset code. Valid for 15 minutes.</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label-ew">6-Digit Code</label>
        <input type="text" name="code" class="ew-form-control"
               placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
               maxlength="6" pattern="\d{6}" inputmode="numeric"
               style="font-size:1.75rem;font-weight:800;letter-spacing:.3em;text-align:center"
               autocomplete="one-time-code" required autofocus>
        <small class="text-muted-ew d-block mt-1 text-center">Enter the 6-digit code sent to your email</small>
      </div>
      <button type="submit" class="btn-primary-ew w-100" style="justify-content:center">
        <i class="fas fa-check"></i> Verify Code
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'accounts:forgot_password' %}" style="color:var(--muted);font-size:.875rem">
        <i class="fas fa-redo me-1"></i> Resend code
      </a>
    </div>
  </div>
</div>
{% endblock %}
