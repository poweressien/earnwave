{% extends 'dashboard/base_dashboard.html' %}
{% block title %}Change Password - EarnWave{% endblock %}
{% block dashboard_content %}
<div class="page-header">
  <h1 class="page-title">&#128274; Change Password</h1>
  <p class="page-subtitle">Update your account password.</p>
</div>
<div class="ew-card" style="max-width:480px">
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label-ew">Current Password</label>
      <input type="password" name="old_password" class="ew-form-control" placeholder="Your current password" required>
    </div>
    <div class="mb-3">
      <label class="form-label-ew">New Password</label>
      <input type="password" name="new_password" class="ew-form-control" placeholder="Min. 8 characters" required>
    </div>
    <div class="mb-4">
      <label class="form-label-ew">Confirm New Password</label>
      <input type="password" name="confirm_password" class="ew-form-control" placeholder="Repeat new password" required>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn-primary-ew"><i class="fas fa-save"></i> Update Password</button>
      <a href="{% url 'accounts:profile' %}" class="btn-outline-ew" style="text-decoration:none"><i class="fas fa-arrow-left"></i> Back</a>
    </div>
  </form>
</div>
{% endblock %}
