{% extends 'base.html' %}
{% block title %}New Password - EarnWave{% endblock %}
{% block body %}
{% include 'partials/navbar.html' %}
<div class="auth-page" style="min-height:calc(100vh - 60px)">
  <div class="auth-bg-glow"></div>
  <div class="auth-card animate-fade-up">
    <div class="text-center mb-4">
      <div style="width:56px;height:56px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.5rem">&#128274;</div>
      <h2 style="font-family:var(--font-display);font-weight:800;font-size:1.5rem">Set New Password</h2>
      <p class="text-muted-ew" style="font-size:.9rem;margin-top:.25rem">Choose a strong password for your account.</p>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label-ew">New Password</label>
        <div style="position:relative">
          <input type="password" name="password1" id="pw1" class="ew-form-control" placeholder="Min. 8 characters" style="padding-right:2.75rem" required>
          <button type="button" onclick="togglePw('pw1','eye1')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer"><i id="eye1" class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label-ew">Confirm New Password</label>
        <div style="position:relative">
          <input type="password" name="password2" id="pw2" class="ew-form-control" placeholder="Repeat password" style="padding-right:2.75rem" required>
          <button type="button" onclick="togglePw('pw2','eye2')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer"><i id="eye2" class="fas fa-eye"></i></button>
        </div>
      </div>
      <!-- Strength meter -->
      <div style="margin-bottom:1rem">
        <div style="display:flex;gap:4px" id="strengthBars">
          <div style="flex:1;height:4px;border-radius:2px;background:var(--dark-border)" id="bar1"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--dark-border)" id="bar2"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--dark-border)" id="bar3"></div>
          <div style="flex:1;height:4px;border-radius:2px;background:var(--dark-border)" id="bar4"></div>
        </div>
        <small id="strengthLabel" class="text-muted-ew" style="font-size:.72rem"></small>
      </div>
      <button type="submit" class="btn-primary-ew w-100" style="justify-content:center">
        <i class="fas fa-lock"></i> Update Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePw(id, iconId) {
  const i = document.getElementById(id);
  const ic = document.getElementById(iconId);
  i.type = i.type === 'password' ? 'text' : 'password';
  ic.className = i.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
document.getElementById('pw1').addEventListener('input', function() {
  const v = this.value;
  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['', '#EF4444', '#F59E0B', '#3B82F6', '#10B981'];
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong ✓'];
  for (let i = 1; i <= 4; i++) {
    document.getElementById('bar'+i).style.background = i <= score ? colors[score] : 'var(--dark-border)';
  }
  document.getElementById('strengthLabel').textContent = labels[score] || '';
  document.getElementById('strengthLabel').style.color = colors[score] || 'var(--muted)';
});
</script>
{% endblock %}
